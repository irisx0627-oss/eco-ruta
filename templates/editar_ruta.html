<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Ruta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        #buscador-colonia {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        select[multiple] {
            width: 100%;
            min-height: 160px;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px;
            font-size: 14px;
        }
        .hint { font-size: 12px; color: #888; margin-top: 4px; }
        .btn-guardar {
            background: #1565c0; color: #fff; border: none;
            padding: 10px 22px; border-radius: 6px;
            cursor: pointer; font-size: 14px; font-weight: 600;
        }
        .btn-guardar:hover { background: #0d47a1; }
        .btn-cancelar {
            background: #757575; color: #fff; text-decoration: none;
            padding: 10px 18px; border-radius: 6px;
            font-size: 14px; margin-left: 10px;
        }
        .btn-cancelar:hover { background: #424242; }
    </style>
</head>

<body>
<div class="contenedor">

    <div class="sidebar">
        <h1>ECO-RUTA</h1>
        <p>Sistema de Gestión</p>
        <div class="linea"></div>
        <ul>
            <li><a href="/index">🏠 Inicio</a></li>
            <li><a href="/colonias">🏘️ Colonias</a></li>
            <li><a href="/rutas" class="activo">🛣️ Rutas</a></li>
            <li><a href="/camiones">🚛 Camiones</a></li>
            <li><a href="/responsables">👤 Responsables</a></li>
            <li><a href="/asignaciones">📋 Asignaciones</a></li>
            <li><a href="/evidencias">📄 Evidencias</a></li>
            <li><a href="/observaciones">👁️ Observaciones</a></li>
            <li><a href="/reportes">📊 Reportes</a></li>
        </ul>
    </div>

    <div class="contenido">

        <div class="header">
            <h1>✏️ EDITAR RUTA</h1>
            <a href="/rutas" class="btn-regresar">← Volver a Rutas</a>
        </div>

        <div class="card">
            <form action="/actualizar_ruta/{{ ruta.id_ruta }}" method="POST"
                  onsubmit="return validarFormularioRuta()">

                <div class="grupo">
                    <label>Nombre Ruta</label>
                    <input type="text" name="nombre_ruta"
                           value="{{ ruta.nombre_ruta }}" required>
                </div>

                <div class="grupo">
                    <label>Descripción</label>
                    <textarea name="descripcion">{{ ruta.descripcion }}</textarea>
                </div>

                <div class="grupo">
                    <label>Distancia KM</label>
                    <input type="number" step="0.01" name="distancia_km"
                           value="{{ ruta.distancia_km }}" required>
                </div>

                <div class="grupo">
                    <label>Colonias <span style="color:#888">(selecciona una o varias)</span></label>
                    <input type="text" id="buscador-colonia"
                           placeholder="🔍 Buscar colonia..."
                           oninput="filtrarColonias('select-colonias', this.value)"
                           autocomplete="off">
                    <select name="ids_colonia" id="select-colonias" multiple required>
                        {% for colonia in colonias %}
                        <option
                            value="{{ colonia.id_colonia }}"
                            {% if colonia.id_colonia in ids_asignadas %}selected{% endif %}
                            {% if colonia.estado == 'Ocupada' and colonia.id_colonia not in ids_asignadas %}
                            style="color:#b71c1c; font-style:italic;"
                            title="Asignada a otra ruta"
                            {% endif %}>
                            {{ colonia.nombre }}
                            {% if colonia.estado == 'Ocupada' and colonia.id_colonia not in ids_asignadas %}
                             — (Ocupada)
                            {% endif %}
                        </option>
                        {% endfor %}
                    </select>
                    <p class="hint">Mantén <strong>Ctrl</strong> (Windows) o <strong>⌘ Cmd</strong> (Mac) para elegir varias.</p>
                </div>

                <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
                <a href="/rutas" class="btn-cancelar">✖ Cancelar</a>

            </form>
        </div>
    </div>
</div>

<script>
    function filtrarColonias(selectId, texto) {
        const sel = document.getElementById(selectId);
        const term = texto.toLowerCase();
        Array.from(sel.options).forEach(opt => {
            opt.style.display = opt.text.toLowerCase().includes(term) ? '' : 'none';
        });
    }

    function validarFormularioRuta() {
        const sel = document.getElementById('select-colonias');
        const seleccionadas = Array.from(sel.options).filter(o => o.selected);
        if (seleccionadas.length === 0) {
            alert('⚠️ Debes seleccionar al menos una colonia.');
            return false;
        }
        return true;
    }
</script>

</body>
</html>
