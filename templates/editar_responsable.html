<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Responsable</title>

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>
<body>

<h1>EDITAR RESPONSABLE</h1>

<form
action="/actualizar_responsable/{{ responsable.id_responsable }}"
method="POST"
>

<label>Nombre</label>
<br>

<input
type="text"
name="nombre"
value="{{ responsable.nombre }}"
required>

<br><br>

<label>Cargo</label>
<br>

<input
type="text"
name="cargo"
value="{{ responsable.cargo }}"
required>

<br><br>

<label>Teléfono</label>
<br>

<input
type="text"
name="telefono"
value="{{ responsable.telefono }}"
required>

<br><br>

<label>Licencia</label>
<br>

<input
type="text"
name="licencia"
value="{{ responsable.licencia }}"
required>

<br><br>

<button type="submit">
Actualizar
</button>

</form>

</body>
</html>
