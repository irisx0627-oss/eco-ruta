<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Reporte</title>

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>
<body>

<h1>EDITAR REPORTE</h1>

<form
action="/actualizar_reporte/{{ reporte.id_reporte }}"
method="POST"
>

<label>Fecha</label>
<br>

<input
type="date"
name="fecha"
value="{{ reporte.fecha }}"
required
>

<br><br>

<label>Descripción</label>
<br>

<textarea
name="descripcion"
rows="4"
cols="40"
required
>{{ reporte.descripcion }}</textarea>

<br><br>

<label>Estado</label>
<br>

<select name="estado">

<option
{% if reporte.estado == 'Pendiente' %}
selected
{% endif %}
>
Pendiente
</option>

<option
{% if reporte.estado == 'En proceso' %}
selected
{% endif %}
>
En proceso
</option>

<option
{% if reporte.estado == 'Resuelto' %}
selected
{% endif %}
>
Resuelto
</option>

</select>

<br><br>

<label>Colonia</label>
<br>

<select name="id_colonia">

{% for colonia in colonias %}

<option
value="{{ colonia.id_colonia }}"
{% if colonia.id_colonia == reporte.id_colonia %}
selected
{% endif %}
>

{{ colonia.nombre }}

</option>

{% endfor %}

</select>

<br><br>

<button type="submit">
Actualizar
</button>

</form>

</body>
</html>
